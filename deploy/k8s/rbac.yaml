apiVersion: v1
kind: ServiceAccount
metadata:
  name: namespace-observatory-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: namespace-observatory-viewer
rules:
- apiGroups: [""]
  resources: ["namespaces", "pods", "services", "events", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: namespace-observatory-binding
subjects:
- kind: ServiceAccount
  name: namespace-observatory-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: namespace-observatory-viewer
  apiGroup: rbac.authorization.k8s.io
