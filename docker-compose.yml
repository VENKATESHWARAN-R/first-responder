version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      NSO_SECRET_KEY: "dev-secret-change-in-production"
      NSO_ADMIN_EMAIL: "admin@namespace-observatory.local"
      NSO_ADMIN_PASSWORD: "admin"
      NSO_K8S_IN_CLUSTER: "false"
      NSO_CORS_ORIGINS: '["http://localhost:3000"]'
      NSO_CACHE_TTL_SECONDS: "15"
    volumes:
      - ~/.kube:/root/.kube:ro
      - backend-data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://backend:8000"
    depends_on:
      - backend

volumes:
  backend-data:
