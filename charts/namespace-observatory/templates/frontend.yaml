apiVersion: apps/v1
kind: Deployment
metadata:
  name: namespace-observatory-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels: { app: namespace-observatory-frontend }
  template:
    metadata:
      labels: { app: namespace-observatory-frontend }
    spec:
      containers:
      - name: frontend
        image: {{ .Values.frontend.image }}
        env:
          - name: NEXT_PUBLIC_API_BASE
            value: "http://namespace-observatory-backend:8000"
        ports: [{ containerPort: 3000 }]
---
apiVersion: v1
kind: Service
metadata:
  name: namespace-observatory-frontend
spec:
  selector: { app: namespace-observatory-frontend }
  ports:
    - port: 80
      targetPort: 3000
